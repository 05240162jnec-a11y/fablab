<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FAB-Lab Auth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-xl rounded-2xl w-full max-w-4xl grid md:grid-cols-2 overflow-hidden">

  <!-- LEFT SIDE -->
  <div class="bg-blue-600 text-white flex flex-col justify-center items-center p-8">
    <h1 class="text-3xl font-bold mb-4">FAB-Lab System</h1>
    <p class="text-center text-sm">Access machines, enroll in training, and manage your bookings easily.</p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="p-8">

    <!-- TOGGLE -->
    <div class="flex justify-center mb-6">
      <button onclick="showLogin()" id="loginTab" class="px-4 py-2 font-semibold border-b-2 border-blue-600">Login</button>
      <button onclick="showRegister()" id="registerTab" class="px-4 py-2 font-semibold text-gray-500">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
      <h2 class="text-xl font-bold mb-4">Login</h2>

      <input type="email" placeholder="Email" class="w-full border p-2 rounded mb-3">
      <input type="password" placeholder="Password" class="w-full border p-2 rounded mb-3">

      <button class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
        Login
      </button>

      <p class="text-sm mt-3 text-gray-500">Forgot password?</p>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" class="hidden">
      <h2 class="text-xl font-bold mb-4">Create Account</h2>

      <input type="text" placeholder="Full Name" class="w-full border p-2 rounded mb-3">

      <select class="w-full border p-2 rounded mb-3">
        <option>Gender</option>
        <option>Male</option>
        <option>Female</option>
      </select>

      <input type="text" placeholder="Phone Number" class="w-full border p-2 rounded mb-3">
      <input type="email" placeholder="Email" class="w-full border p-2 rounded mb-3">

      <!-- ROLE -->
      <select id="role" onchange="handleRole()" class="w-full border p-2 rounded mb-3">
        <option value="">Select Role</option>
        <option value="student">Student</option>
        <option value="faculty">Faculty</option>
      </select>

      <!-- DEPARTMENT -->
      <input type="text" placeholder="Department" class="w-full border p-2 rounded mb-3">

      <!-- YEAR (ONLY FOR STUDENT) -->
      <div id="yearField" class="hidden">
        <input type="text" placeholder="Year" class="w-full border p-2 rounded mb-3">
      </div>

      <input type="password" placeholder="Password" class="w-full border p-2 rounded mb-3">
      <input type="password" placeholder="Confirm Password" class="w-full border p-2 rounded mb-3">

      <button class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">
        Register
      </button>
    </div>

  </div>
</div>

<script>
  function showLogin() {
    document.getElementById("loginForm").classList.remove("hidden");
    document.getElementById("registerForm").classList.add("hidden");

    document.getElementById("loginTab").classList.add("border-blue-600");
    document.getElementById("registerTab").classList.remove("border-blue-600");
  }

  function showRegister() {
    document.getElementById("registerForm").classList.remove("hidden");
    document.getElementById("loginForm").classList.add("hidden");

    document.getElementById("registerTab").classList.add("border-blue-600");
    document.getElementById("loginTab").classList.remove("border-blue-600");
  }

  function handleRole() {
    const role = document.getElementById("role").value;
    const yearField = document.getElementById("yearField");

    if (role === "student") {
      yearField.classList.remove("hidden");
    } else {
      yearField.classList.add("hidden");
    }
  }
</script>

</body>
</html>
